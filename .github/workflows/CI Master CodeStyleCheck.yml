name: CI Master CodeStyleCheck

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'  # match your project's target SDK

      - name: Check code formatting
        run: dotnet format ./src/HouseholdTracker/HouseholdTracker.Core.csproj --verify-no-changes --verbosity diagnostic
